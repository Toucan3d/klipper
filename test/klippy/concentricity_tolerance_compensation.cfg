[manual_stepper ctc_axis]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
velocity: 90
accel: 500

[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[concentricity_tolerance_compensation]
axis: A
deflection_angle: 0.0
deflection_radius: 2.0
split_delta_xy: 0.01
move_check_distance_axis: 30.0

[gcode_macro ASSERT_CTC_ACTIVE]
gcode:
  {% if printer.gcode_move.axis_map.A != 4 %}
    { action_raise_error("ctc axis_map.A mismatch") }
  {% endif %}
  {% if printer.gcode_move.position.x < 9.9 or printer.gcode_move.position.x > 10.1 %}
    { action_raise_error("ctc logical X mismatch") }
  {% endif %}
  {% if printer.gcode_move.position.y < 4.9 or printer.gcode_move.position.y > 5.1 %}
    { action_raise_error("ctc logical Y mismatch") }
  {% endif %}
  {% if printer.toolhead.position.x < 7.9 or printer.toolhead.position.x > 8.1 %}
    { action_raise_error("ctc compensated X mismatch") }
  {% endif %}
  {% if printer.toolhead.position.y < 4.9 or printer.toolhead.position.y > 5.1 %}
    { action_raise_error("ctc compensated Y mismatch") }
  {% endif %}
  {% if printer.toolhead.position[printer.gcode_move.axis_map.A] < 179.9 or printer.toolhead.position[printer.gcode_move.axis_map.A] > 180.1 %}
    { action_raise_error("ctc compensated A mismatch") }
  {% endif %}

[gcode_macro ASSERT_CTC_INACTIVE]
gcode:
  {% if printer.gcode_move.position.x < 5.9 or printer.gcode_move.position.x > 6.1 %}
    { action_raise_error("ctc inactive logical X mismatch") }
  {% endif %}
  {% if printer.gcode_move.position.y < 3.9 or printer.gcode_move.position.y > 4.1 %}
    { action_raise_error("ctc inactive logical Y mismatch") }
  {% endif %}
  {% if printer.toolhead.position.x < 5.9 or printer.toolhead.position.x > 6.1 %}
    { action_raise_error("ctc inactive toolhead X mismatch") }
  {% endif %}
  {% if printer.toolhead.position.y < 3.9 or printer.toolhead.position.y > 4.1 %}
    { action_raise_error("ctc inactive toolhead Y mismatch") }
  {% endif %}
